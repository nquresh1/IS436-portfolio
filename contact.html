</head>
<body>

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">MyPortfolio</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>

          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <section style="background-color: #F7DDE2;" class="py-4"></section>
    <div class="container">
      <h1 class="fw-bold" style="color:#6F4E37;">Contact Me</h1>
      <p class="text-secondary mb-0">Feel free to reach out anytime.</p>
    </div>
  </section>

  <!-- Contact Section -->
  <section class="py-5">
    <div class="container">
      <div class="row g-5">

        <!-- Contact Info -->
        <div class="col-md-5">
          <h4 class="fw-bold mb-4">Get In Touch</h4>

          <div class="d-flex align-items-start mb-3">
            <i class="bi bi-envelope-fill fs-4 me-3" style="color:#6F4E37;"></i>
            <div>
              <p class="fw-semibold mb-0">Email</p>
              <p class="text-muted mb-0">nquresh1@umbc.edu</p>
            </div>
          </div>

          <div class="d-flex align-items-start mb-3">
            <i class="bi bi-telephone-fill fs-4 me-3" style="color:#F7DDE2;"></i>
            <div>
              <p class="fw-semibold mb-0">Phone</p>
              <p class="text-muted mb-0">+1 (443)-345-6499</p>
            </div>
          </div>

          <div class="d-flex align-items-start mb-4">
            <i class="bi bi-geo-alt-fill fs-4 me-3" style="color:#355E3B;"></i>
            <div>
              <p class="fw-semibold mb-0">Location</p>
              <p class="text-muted mb-0">Millersville, MD, USA</p>
            </div>
          </div>

          <hr />

          <!-- Social Links -->
<h6 class="fw-bold mb-3">Connect With Me</h6>
<div class="d-flex gap-3">

  <a href="https://github.com/nquresh1" target="_blank"
     class="btn btn-sm"
     style="border:2px solid #6F4E37; color:#6F4E37;">
    <i class="bi bi-github me-1"></i>GitHub
  </a>

  <a href="https://www.linkedin.com" target="_blank"
     class="btn btn-sm"
     style="border:2px solid #6F4E37; color:#6F4E37;">
    <i class="bi bi-linkedin me-1"></i>LinkedIn
  </a>

</div>
     

</div>

        <!-- Contact Form -->
        <div class="col-md-7">
          <h4 class="fw-bold mb-4">Send a Message</h4>
          <form>
            <div class="row g-3">
              <div class="col-sm-6">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" placeholder="John" />
              </div>
              <div class="col-sm-6">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" placeholder="Doe" />
              </div>
              <div class="col-12">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="john@example.com" />
              </div>
              <div class="col-12">
                <label class="form-label">Subject</label>
                <input type="text" class="form-control" placeholder="What is this about?" />
              </div>
              <div class="col-12">
                <label class="form-label">Message</label>
                <textarea class="form-control" rows="5" placeholder="Write your message here..."></textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-lg w-100"
                style="background-color:#355E3B; color:white;">
                <i class="bi bi-send me-2"></i>Send Message
              </button>
                </button>
              </div>
            </div>
          </form>
        </div>

      </div>
    </div>
  </section>


  <!-- Footer -->
  <footer class="text-white text-center py-3" style="background-color:#6F4E37;">
    <p class="mb-0">&copy; 2026 MyPortfolio. Built with Bootstrap 5.</p>
  </footer>
